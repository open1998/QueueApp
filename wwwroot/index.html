<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QueueApp - Modern UI</title>
    <base href="/" />
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
        @theme {
          --color-brand: #3b82f6;
        }
        body { background-color: #f8fafc; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="app">
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500 mb-4"></div>
                <p class="text-slate-500 font-medium">Loading Modern Queue System...</p>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui" style="display:none; position: fixed; bottom: 0; background: #fee2e2; width: 100%; padding: 1rem; text-align: center; z-index: 1000;">
        An unhandled error has occurred. <a href="" class="reload">Reload</a>
    </div>

    <script>
        // Critical fix for .NET 10 Preview fingerprinting
        window.Blazor = window.Blazor || {};
        window.Blazor.start = (function() {
            var originalStart = window.Blazor.start;
            return function(options) {
                if (!options) options = {};
                options.loadBootResource = function(type, name, defaultUri, integrity) {
                    return defaultUri;
                };
                return originalStart(options);
            };
        })();
    </script>
    <script src="_framework/blazor.webview.js"></script>
</body>
</html>
